- name: setup catalogue server
  hosts: catalogue
  become: yes
  tasks:
  - name: disable default catalogue
    ansible.builtin.command: dnf module disable nodejs -y
  - name: enabled noedjs 
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs server
    ansible.builtin.package:
      name: nodejs
      state: present

  - name: create roboshop system user 
    ansible.builtin.user:
      name: roboshop
      comment: system user
      system: true
      shell: /sbin/nologin
      home: /app

  - name: remove app directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: create app directory 
    ansible.builtin.file:
    path: /app
    state: directory

  - name: install catalogue
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip

  - name: extract catalogue Application
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes
      
  - name: delete catalogue file
    ansible.builtin.file:
      path: /tmp/catalogue.zip
      state: absent
 
 
  
  - name: install dependies
    community.general.npm:
      path: /app

  - name: copy the catalogue service
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: copy mongo repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: install mongodb client
    ansible.builtin.package:
      name: mongodb-mongosh
      state: present

  - name: connect to mangodb catalogue
    ansible.builtin.command: 
     mongosh mongodb.daws88s.sbs --quiet --eval "db.getMongo().getDBNames().indexOf('catalogue')"
    register: catalogue_output

  # - name: print the catalogue output
  #   ansible.builtin.debug:
  #     msg: "{{ catalogue_output }}"

  - name: load products into mongodb
    ansible.builtin.shell: mongosh --host mongodb.daws88s.sbs </app/db/master-data.js
    when: catalogue_output.stdout | int < 0

  # - name: start the services and enabled
  #   ansible.builtin.service:
  #     name: catalogue
  #     enabled: yes
  #     state: started


  - name: daemon reload and enable start the server
    ansible.builtin.systemd_service:
      name: catalogue
      enabled: true
      state: started
      daemon_reload: true
      







