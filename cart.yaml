- name: setup cart server
  hosts: cart
  become: yes
  tasks:
  - name: disable default cart
    ansible.builtin.command: dnf module disable nodejs -y
  - name: enabled noedjs 
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs server
    ansible.builtin.package:
      name: nodejs
      state: present

  - name: create roboshop system user 
    ansible.builtin.user:
      name: roboshop
      comment: system user
      system: true
      shell: /sbin/nologin
      home: /app

  - name: remove app directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: create app directory 
    ansible.builtin.file:
      path: /app
      state: directory

  - name: delete cart file
    ansible.builtin.file:
      path: /tmp/cart.zip
      state: absent
 
  - name: install cart
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip
      dest: /tmp/cart.zip

  - name: extract cart Application
    ansible.builtin.unarchive:
      src: /tmp/cart.zip
      dest: /app
      remote_src: yes
  
  - name: install dependies
    community.general.npm:
      path: /app

  - name: copy the cart service
    ansible.builtin.copy:
      src: cart.service
      dest: /etc/systemd/system/cart.service

  - name: daemon reload and enable start the server
    ansible.builtin.systemd_service:
      name: cart
      enabled: true
      state: started
      daemon_reload: true
      
