- name: setup user server
  hosts: user
  become: yes
  tasks:
  - name: disable default user
    ansible.builtin.command: dnf module disable nodejs -y
  - name: enabled noedjs 
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs server
    ansible.builtin.package:
      name: nodejs
      state: present

  - name: create roboshop system user 
    ansible.builtin.user:
      name: roboshop
      comment: RoboShop system user
      system: true
      shell: /sbin/nologin
      home: /app

  - name: remove app directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: create app directory 
    ansible.builtin.file:
      state: directory
      path: /app

  - name: delete user file
    ansible.builtin.file:
      path: /tmp/user.zip
      state: absent

  - name: install user
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip
      dest: /tmp/user.zip

  - name: extract user Application
    ansible.builtin.unarchive:
      src: /tmp/user.zip
      dest: /app
      remote_src: yes
 
  - name: install dependies
    community.general.npm:
      path: /app

  - name: copy the user service
    ansible.builtin.copy:
      src: user.service
      dest: /etc/systemd/system/user.service

  - name: daemon reload and enable start the server
    ansible.builtin.systemd_service:
      name: user
      enabled: true
      state: started
      daemon_reload: true