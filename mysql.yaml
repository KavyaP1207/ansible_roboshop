- name: setup mysql server
  hosts: mysql
  become: yes

  vars:
    mysql_root_password: RoboShop@1

  tasks:

    # 🔹 Install MySQL
    - name: install mysql server
      ansible.builtin.package:
        name: mysql-server
        state: present

    # 🔹 Start MySQL
    - name: start and enable mysql
      ansible.builtin.service:
        name: mysqld
        state: started
        enabled: yes

    # 🔹 Install dependency
    - name: install pymysql
      ansible.builtin.package:
        name: python3-PyMySQL
        state: present

    # 🔥 Set root password safely
    - name: set root password
      ansible.builtin.shell: |
        mysqladmin -u root password "{{ mysql_root_password }}" || true

    # 🔹 Allow remote root access
    - name: allow root remote access
      community.mysql.mysql_user:
        name: root
        host: "%"
        password: "{{ mysql_root_password }}"
        priv: "*.*:ALL,GRANT"
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"

    # 🔹 Remove anonymous users
    - name: remove anonymous users
      community.mysql.mysql_user:
        name: ''
        host_all: yes
        state: absent
        login_user: root
        login_password: "{{ mysql_root_password }}"

    # 🔹 Remove test DB
    - name: remove test database
      community.mysql.mysql_db:
        name: test
        state: absent
        login_user: root
        login_password: "{{ mysql_root_password }}"

    # 🔹 Install git
    - name: install git
      ansible.builtin.package:
        name: git
        state: present

    # 🔹 Clone schema repo
    - name: clone mysql repo
      ansible.builtin.git:
        repo: https://github.com/roboshop-devops-project/mysql.git
        dest: /tmp/mysql

    # 🔥 Fix MySQL 8 incompatible syntax
    - name: fix schema for mysql 8
      ansible.builtin.shell: |
        sed -i 's/IDENTIFIED BY/# IDENTIFIED BY/g' /tmp/mysql/shipping.sql

    # 🔹 Load schema
    - name: load shipping schema
      ansible.builtin.shell: |
        mysql -h localhost -uroot -p{{ mysql_root_password }} < /tmp/mysql/shipping.sql
      args:
        executable: /bin/bash